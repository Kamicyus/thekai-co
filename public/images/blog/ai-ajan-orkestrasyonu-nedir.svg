<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8FB32"/>
      <stop offset="100%" stop-color="#A8D010"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Central orchestrator node -->
  <circle cx="600" cy="315" r="50" fill="none" stroke="#D8FB32" stroke-width="2.5" opacity="0.9"/>
  <circle cx="600" cy="315" r="20" fill="#D8FB32" opacity="0.25"/>
  <!-- Satellite nodes -->
  <circle cx="380" cy="180" r="28" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <circle cx="820" cy="180" r="28" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="380" cy="450" r="28" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="820" cy="450" r="28" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="315" r="22" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <circle cx="1000" cy="315" r="22" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <!-- Connection lines -->
  <line x1="600" y1="315" x2="380" y2="180" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="315" x2="820" y2="180" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="315" x2="380" y2="450" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="315" x2="820" y2="450" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="315" x2="200" y2="315" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <line x1="600" y1="315" x2="1000" y2="315" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <!-- Outer ring -->
  <circle cx="600" cy="315" r="220" fill="none" stroke="#D8FB32" stroke-width="0.5" opacity="0.12" stroke-dasharray="8 6"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>