<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Building blocks - stacked rectangles -->
  <rect x="420" y="400" width="100" height="80" rx="6" fill="none" stroke="#D8FB32" stroke-width="2" opacity="0.8"/>
  <rect x="540" y="400" width="100" height="80" rx="6" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.7"/>
  <rect x="660" y="400" width="100" height="80" rx="6" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  <!-- Second row -->
  <rect x="480" y="300" width="100" height="80" rx="6" fill="#D8FB32" opacity="0.1" stroke="#D8FB32" stroke-width="1.5"/>
  <rect x="600" y="300" width="100" height="80" rx="6" fill="#A855F7" opacity="0.08" stroke="#A855F7" stroke-width="1.5"/>
  <!-- Top block -->
  <rect x="540" y="200" width="100" height="80" rx="6" fill="#D8FB32" opacity="0.15" stroke="#D8FB32" stroke-width="2"/>
  <!-- Floating connector dots -->
  <circle cx="350" cy="350" r="4" fill="#D8FB32" opacity="0.3"/>
  <circle cx="830" cy="350" r="4" fill="#A855F7" opacity="0.3"/>
  <circle cx="350" cy="250" r="3" fill="#3B82F6" opacity="0.2"/>
  <circle cx="830" cy="250" r="3" fill="#D8FB32" opacity="0.2"/>
  <!-- Dashed arrow going up -->
  <line x1="590" y1="180" x2="590" y2="120" stroke="#D8FB32" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>
  <polygon points="583,125 590,108 597,125" fill="#D8FB32" opacity="0.4"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>