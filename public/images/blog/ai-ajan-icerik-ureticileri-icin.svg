<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Social media icons grid (abstract geometric) -->
  <!-- Row 1 -->
  <rect x="360" y="160" width="80" height="80" rx="16" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="200" r="22" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <rect x="480" y="160" width="80" height="80" rx="16" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <polygon points="520,185 535,210 505,210" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.3"/>
  <rect x="600" y="160" width="80" height="80" rx="16" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="640" cy="195" r="10" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <circle cx="660" cy="210" r="8" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.25"/>
  <rect x="720" y="160" width="80" height="80" rx="16" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <!-- Row 2 -->
  <rect x="420" y="280" width="80" height="80" rx="16" fill="#D8FB32" opacity="0.05" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <rect x="540" y="280" width="80" height="80" rx="16" fill="#A855F7" opacity="0.04" stroke="#A855F7" stroke-width="1.5" opacity="0.45"/>
  <rect x="660" y="280" width="80" height="80" rx="16" fill="#3B82F6" opacity="0.04" stroke="#3B82F6" stroke-width="1.5" opacity="0.45"/>
  <!-- Row 3 -->
  <rect x="360" y="400" width="80" height="80" rx="16" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.35"/>
  <rect x="480" y="400" width="80" height="80" rx="16" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <rect x="600" y="400" width="80" height="80" rx="16" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.35"/>
  <rect x="720" y="400" width="80" height="80" rx="16" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <!-- Connecting lines between grid items -->
  <line x1="440" y1="240" x2="460" y2="280" stroke="#D8FB32" stroke-width="0.5" opacity="0.15"/>
  <line x1="560" y1="240" x2="580" y2="280" stroke="#A855F7" stroke-width="0.5" opacity="0.12"/>
  <line x1="680" y1="240" x2="700" y2="280" stroke="#3B82F6" stroke-width="0.5" opacity="0.12"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>