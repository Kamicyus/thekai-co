<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Dashboard frame -->
  <rect x="200" y="120" width="800" height="400" rx="12" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.3"/>
  <!-- Top bar -->
  <line x1="200" y1="170" x2="1000" y2="170" stroke="#D8FB32" stroke-width="0.5" opacity="0.2"/>
  <circle cx="230" cy="145" r="6" fill="#D8FB32" opacity="0.3"/>
  <circle cx="252" cy="145" r="6" fill="#A855F7" opacity="0.2"/>
  <circle cx="274" cy="145" r="6" fill="#3B82F6" opacity="0.2"/>
  <!-- Sidebar -->
  <line x1="360" y1="170" x2="360" y2="520" stroke="#D8FB32" stroke-width="0.5" opacity="0.15"/>
  <!-- Sidebar items -->
  <rect x="220" y="195" width="120" height="10" rx="2" fill="#D8FB32" opacity="0.12"/>
  <rect x="220" y="225" width="100" height="10" rx="2" fill="#A855F7" opacity="0.1"/>
  <rect x="220" y="255" width="110" height="10" rx="2" fill="#3B82F6" opacity="0.1"/>
  <rect x="220" y="285" width="90" height="10" rx="2" fill="#D8FB32" opacity="0.08"/>
  <!-- Main content - mini cards -->
  <rect x="390" y="195" width="180" height="120" rx="8" fill="#D8FB32" opacity="0.06" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <rect x="590" y="195" width="180" height="120" rx="8" fill="#A855F7" opacity="0.04" stroke="#A855F7" stroke-width="0.8" opacity="0.2"/>
  <rect x="790" y="195" width="180" height="120" rx="8" fill="#3B82F6" opacity="0.04" stroke="#3B82F6" stroke-width="0.8" opacity="0.2"/>
  <!-- Bottom charts area -->
  <rect x="390" y="340" width="280" height="150" rx="8" fill="none" stroke="#D8FB32" stroke-width="0.5" opacity="0.15"/>
  <polyline points="410,460 440,430 480,445 530,390 580,410 640,370" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <rect x="690" y="340" width="280" height="150" rx="8" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.15"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>