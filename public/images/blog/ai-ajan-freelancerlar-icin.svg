<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Central person silhouette (abstract) -->
  <circle cx="600" cy="230" r="35" fill="none" stroke="#D8FB32" stroke-width="2.5" opacity="0.8"/>
  <line x1="600" y1="265" x2="600" y2="360" stroke="#D8FB32" stroke-width="2" opacity="0.6"/>
  <!-- Surrounding agent circles -->
  <circle cx="400" cy="180" r="22" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="800" cy="180" r="22" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="340" cy="340" r="22" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="860" cy="340" r="22" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <circle cx="440" cy="470" r="18" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <circle cx="760" cy="470" r="18" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <!-- Connection lines from person to agents -->
  <line x1="575" y1="225" x2="422" y2="185" stroke="#D8FB32" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="625" y1="225" x2="778" y2="185" stroke="#D8FB32" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="575" y1="310" x2="362" y2="335" stroke="#D8FB32" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="625" y1="310" x2="838" y2="335" stroke="#D8FB32" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="580" y1="360" x2="455" y2="460" stroke="#D8FB32" stroke-width="0.8" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="620" y1="360" x2="745" y2="460" stroke="#D8FB32" stroke-width="0.8" opacity="0.15" stroke-dasharray="4 4"/>
  <!-- Small dots inside agent circles -->
  <circle cx="400" cy="180" r="6" fill="#A855F7" opacity="0.2"/>
  <circle cx="800" cy="180" r="6" fill="#3B82F6" opacity="0.2"/>
  <circle cx="340" cy="340" r="6" fill="#3B82F6" opacity="0.15"/>
  <circle cx="860" cy="340" r="6" fill="#A855F7" opacity="0.15"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>