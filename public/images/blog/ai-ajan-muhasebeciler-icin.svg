<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Calculator body -->
  <rect x="340" y="160" width="220" height="320" rx="10" fill="none" stroke="#D8FB32" stroke-width="2" opacity="0.6"/>
  <!-- Calculator screen -->
  <rect x="360" y="180" width="180" height="60" rx="4" fill="#D8FB32" opacity="0.05" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <!-- Calculator buttons grid -->
  <rect x="365" y="260" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.08"/>
  <rect x="411" y="260" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.06"/>
  <rect x="457" y="260" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.08"/>
  <rect x="503" y="260" width="38" height="30" rx="3" fill="#A855F7" opacity="0.08"/>
  <rect x="365" y="300" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.06"/>
  <rect x="411" y="300" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.08"/>
  <rect x="457" y="300" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.06"/>
  <rect x="503" y="300" width="38" height="30" rx="3" fill="#A855F7" opacity="0.06"/>
  <rect x="365" y="340" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.08"/>
  <rect x="411" y="340" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.06"/>
  <rect x="457" y="340" width="38" height="30" rx="3" fill="#D8FB32" opacity="0.08"/>
  <rect x="503" y="340" width="38" height="90" rx="3" fill="#D8FB32" opacity="0.1"/>
  <rect x="365" y="380" width="130" height="50" rx="3" fill="#D8FB32" opacity="0.06"/>
  <!-- Chart area (right side) -->
  <!-- Bar chart -->
  <rect x="660" y="340" width="40" height="120" rx="3" fill="#D8FB32" opacity="0.15"/>
  <rect x="720" y="290" width="40" height="170" rx="3" fill="#A855F7" opacity="0.12"/>
  <rect x="780" y="260" width="40" height="200" rx="3" fill="#3B82F6" opacity="0.12"/>
  <rect x="840" y="310" width="40" height="150" rx="3" fill="#D8FB32" opacity="0.1"/>
  <rect x="900" y="230" width="40" height="230" rx="3" fill="#D8FB32" opacity="0.15"/>
  <!-- Chart baseline -->
  <line x1="640" y1="460" x2="960" y2="460" stroke="#D8FB32" stroke-width="0.5" opacity="0.2"/>
  <!-- Trend line over bars -->
  <polyline points="680,330 740,280 800,250 860,300 920,220" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>