<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Open book -->
  <path d="M600,400 L400,380 L400,180 L600,200 Z" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <path d="M600,400 L800,380 L800,180 L600,200 Z" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <!-- Book spine -->
  <line x1="600" y1="200" x2="600" y2="400" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <!-- Page lines left -->
  <line x1="430" y1="220" x2="575" y2="230" stroke="#D8FB32" stroke-width="0.5" opacity="0.12"/>
  <line x1="430" y1="250" x2="575" y2="260" stroke="#D8FB32" stroke-width="0.5" opacity="0.1"/>
  <line x1="430" y1="280" x2="575" y2="290" stroke="#D8FB32" stroke-width="0.5" opacity="0.12"/>
  <line x1="430" y1="310" x2="565" y2="320" stroke="#D8FB32" stroke-width="0.5" opacity="0.1"/>
  <!-- Page lines right -->
  <line x1="625" y1="230" x2="770" y2="220" stroke="#D8FB32" stroke-width="0.5" opacity="0.12"/>
  <line x1="625" y1="260" x2="770" y2="250" stroke="#D8FB32" stroke-width="0.5" opacity="0.1"/>
  <line x1="625" y1="290" x2="770" y2="280" stroke="#D8FB32" stroke-width="0.5" opacity="0.12"/>
  <!-- Graduation cap above book -->
  <!-- Cap top (diamond shape) -->
  <polygon points="600,110 520,150 600,170 680,150" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.6"/>
  <polygon points="600,110 520,150 600,170 680,150" fill="#A855F7" opacity="0.05"/>
  <!-- Cap button -->
  <circle cx="600" cy="140" r="5" fill="#A855F7" opacity="0.2"/>
  <!-- Tassel -->
  <line x1="680" y1="150" x2="720" y2="200" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <circle cx="720" cy="205" r="4" fill="#D8FB32" opacity="0.3"/>
  <!-- Knowledge particles floating up -->
  <circle cx="500" cy="160" r="3" fill="#D8FB32" opacity="0.2"/>
  <circle cx="700" cy="140" r="2" fill="#3B82F6" opacity="0.2"/>
  <circle cx="450" cy="130" r="2" fill="#A855F7" opacity="0.15"/>
  <circle cx="750" cy="170" r="2.5" fill="#D8FB32" opacity="0.15"/>
  <circle cx="550" cy="100" r="1.5" fill="#D8FB32" opacity="0.12"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>