<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Growth chart -->
  <polyline points="250,450 380,400 500,420 600,320 720,280 850,180 950,140" fill="none" stroke="#D8FB32" stroke-width="2.5" opacity="0.8"/>
  <!-- Chart area fill -->
  <polygon points="250,450 380,400 500,420 600,320 720,280 850,180 950,140 950,450" fill="#D8FB32" opacity="0.04"/>
  <!-- Data points -->
  <circle cx="380" cy="400" r="4" fill="#D8FB32" opacity="0.6"/>
  <circle cx="500" cy="420" r="4" fill="#D8FB32" opacity="0.6"/>
  <circle cx="600" cy="320" r="4" fill="#D8FB32" opacity="0.6"/>
  <circle cx="720" cy="280" r="4" fill="#D8FB32" opacity="0.6"/>
  <circle cx="850" cy="180" r="4" fill="#D8FB32" opacity="0.6"/>
  <circle cx="950" cy="140" r="5" fill="#D8FB32" opacity="0.8"/>
  <!-- Megaphone shape -->
  <polygon points="180,250 260,210 260,290" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <rect x="260" y="220" width="60" height="50" rx="4" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <!-- Sound waves from megaphone -->
  <path d="M340,245 Q370,220 340,195" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.3"/>
  <path d="M360,245 Q400,210 360,175" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>
  <!-- Axis lines -->
  <line x1="240" y1="460" x2="960" y2="460" stroke="#D8FB32" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="140" x2="240" y2="460" stroke="#D8FB32" stroke-width="0.5" opacity="0.15"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>