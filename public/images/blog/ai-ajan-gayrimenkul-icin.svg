  <line x1="250" y1="480" x2="900" y2="480" stroke="#D8FB32" stroke-width="0.5" opacity="0.2"/>
  <!-- Key element -->
  <circle cx="920" cy="280" r="30" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <circle cx="920" cy="280" r="12" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="310" x2="920" y2="400" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <line x1="920" y1="370" x2="940" y2="370" stroke="#D8FB32" stroke-width="1.5" opacity="0.4"/>
  <line x1="920" y1="390" x2="935" y2="390" stroke="#D8FB32" stroke-width="1.5" opacity="0.3"/>
