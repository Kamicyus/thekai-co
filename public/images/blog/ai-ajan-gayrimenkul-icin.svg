<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Buildings skyline -->
  <!-- Building 1 (tall) -->
  <rect x="320" y="180" width="80" height="300" rx="2" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <rect x="330" y="200" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.06"/>
  <rect x="355" y="200" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.06"/>
  <rect x="380" y="200" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.06"/>
  <rect x="330" y="240" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.04"/>
  <rect x="355" y="240" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.06"/>
  <rect x="380" y="240" width="15" height="20" rx="1" fill="#D8FB32" opacity="0.04"/>
  <!-- Building 2 (medium) -->
  <rect x="420" y="260" width="100" height="220" rx="2" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.4"/>
  <rect x="435" y="280" width="18" height="22" rx="1" fill="#A855F7" opacity="0.05"/>
  <rect x="465" y="280" width="18" height="22" rx="1" fill="#A855F7" opacity="0.05"/>
  <rect x="495" y="280" width="18" height="22" rx="1" fill="#A855F7" opacity="0.05"/>
  <!-- Building 3 (tallest) -->
  <rect x="540" y="140" width="90" height="340" rx="2" fill="none" stroke="#D8FB32" stroke-width="2" opacity="0.6"/>
  <rect x="555" y="160" width="16" height="22" rx="1" fill="#D8FB32" opacity="0.08"/>
  <rect x="580" y="160" width="16" height="22" rx="1" fill="#D8FB32" opacity="0.08"/>
  <rect x="605" y="160" width="16" height="22" rx="1" fill="#D8FB32" opacity="0.06"/>
  <!-- Building 4 -->
  <rect x="650" y="220" width="80" height="260" rx="2" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.4"/>
  <!-- Building 5 -->
  <rect x="750" y="290" width="70" height="190" rx="2" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.35"/>
