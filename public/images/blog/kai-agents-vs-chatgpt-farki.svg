<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#D8FB32" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Center divider -->
  <line x1="600" y1="100" x2="600" y2="530" stroke="#D8FB32" stroke-width="1" opacity="0.3"/>
  <!-- VS circle -->
  <circle cx="600" cy="315" r="35" fill="#0A0A0A" stroke="#D8FB32" stroke-width="2" opacity="0.9"/>
  <!-- Left side - multi-agent system (Kai) -->
  <circle cx="300" cy="220" r="30" fill="none" stroke="#D8FB32" stroke-width="2" opacity="0.7"/>
  <circle cx="220" cy="340" r="20" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <circle cx="380" cy="340" r="20" fill="none" stroke="#D8FB32" stroke-width="1.5" opacity="0.5"/>
  <circle cx="250" cy="440" r="16" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <circle cx="350" cy="440" r="16" fill="none" stroke="#D8FB32" stroke-width="1" opacity="0.4"/>
  <!-- Left connections -->
  <line x1="300" y1="250" x2="220" y2="320" stroke="#D8FB32" stroke-width="0.8" opacity="0.25"/>
  <line x1="300" y1="250" x2="380" y2="320" stroke="#D8FB32" stroke-width="0.8" opacity="0.25"/>
  <line x1="220" y1="360" x2="250" y2="424" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <line x1="380" y1="360" x2="350" y2="424" stroke="#D8FB32" stroke-width="0.8" opacity="0.2"/>
  <!-- Right side - single chat bubble -->
  <rect x="830" y="250" width="160" height="130" rx="16" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <circle cx="880" cy="315" r="4" fill="#A855F7" opacity="0.4"/>
  <circle cx="910" cy="315" r="4" fill="#A855F7" opacity="0.4"/>
  <circle cx="940" cy="315" r="4" fill="#A855F7" opacity="0.4"/>
  <!-- kai branding -->
  <circle cx="1150" cy="580" r="20" fill="#D8FB32" opacity="0.12"/>
</svg>