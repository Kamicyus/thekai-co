<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- The Kai Icon: K-Pinwheel / Spark -->
  <!-- 5 angular petals, each resembling the diagonal arm of letter K -->
  <!-- Rotated around center, creating a dynamic windmill effect -->
  <rect width="512" height="512" rx="96" fill="#0A0A0A"/>
  <g transform="translate(256, 256)">
    <!-- Petal 1: 0° -->
    <path d="M-8 -12 L-30 -110 Q-25 -115 -15 -112 L8 -45 L35 -108 Q42 -112 48 -105 L12 -12 Z"
          fill="#D8FB32" transform="rotate(0)"/>
    <!-- Petal 2: 72° -->
    <path d="M-8 -12 L-30 -110 Q-25 -115 -15 -112 L8 -45 L35 -108 Q42 -112 48 -105 L12 -12 Z"
          fill="#D8FB32" transform="rotate(72)"/>
    <!-- Petal 3: 144° -->
    <path d="M-8 -12 L-30 -110 Q-25 -115 -15 -112 L8 -45 L35 -108 Q42 -112 48 -105 L12 -12 Z"
          fill="#D8FB32" transform="rotate(144)"/>
    <!-- Petal 4: 216° -->
    <path d="M-8 -12 L-30 -110 Q-25 -115 -15 -112 L8 -45 L35 -108 Q42 -112 48 -105 L12 -12 Z"
          fill="#D8FB32" transform="rotate(216)"/>
    <!-- Petal 5: 288° -->
    <path d="M-8 -12 L-30 -110 Q-25 -115 -15 -112 L8 -45 L35 -108 Q42 -112 48 -105 L12 -12 Z"
          fill="#D8FB32" transform="rotate(288)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="16" fill="#D8FB32"/>
  </g>
</svg>
